<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · La Casa de Krizz</title>

    <link rel="icon" href="imagenes/logo-blog2.png">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-container">
        <div class="brand">
            <img src="imagenes/logo-blog2.png" alt="Logo-La Casa de Kriss" loading="lazy">
            <span>La Casa de Kriss</span>
        </div>

        <nav class="nav">
            <a href="./">Volver</a>
        </nav>
    </div>
</header>

<main class="admin-panel">
    <section class="admin-card">
        <h1>Administrar videos</h1>
        <p class="admin-meta">
            Aquí solo se guardan IDs de YouTube en Firestore (no se suben archivos).
            La página principal seguirá funcionando aunque esto falle.
        </p>

        <div class="admin-actions">
            <div>
                <button class="btnLink" id="btnSignIn">Iniciar sesión con Google</button>
                <button class="btnLink" id="btnSignOut" style="display:none;">Cerrar sesión</button>
                <div class="admin-status" id="userInfo"></div>
                <div class="admin-status" id="status"></div>
            </div>

            <div id="editor" style="display:none;">
                <div class="admin-row" data-slot="1">
                    <label>Slot 1</label>
                    <input type="text" class="videoInput" placeholder="Pega link o ID de YouTube">
                    <button class="btnLink btnSave">Guardar</button>
                </div>

                <div class="admin-row" data-slot="2">
                    <label>Slot 2</label>
                    <input type="text" class="videoInput" placeholder="Pega link o ID de YouTube">
                    <button class="btnLink btnSave">Guardar</button>
                </div>

                <p class="admin-meta">
                    Firestore: colección <code>videos</code>, documentos <code>1</code> y <code>2</code>, campo <code>videoId</code>.
                </p>
            </div>
        </div>
    </section>
</main>

<script src="./firebase-config.js"></script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  onAuthStateChanged,
  signInWithPopup,
  signOut,
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

function normalizeYouTubeId(value) {
  const s = String(value || "").trim();
  if (!s) return null;

  const m0 = s.match(/^([a-zA-Z0-9_-]{11})/);
  if (m0) return m0[1];

  const m1 = s.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m1) return m1[1];

  return null;
}

const statusEl = document.getElementById("status");
const userInfoEl = document.getElementById("userInfo");
const editorEl = document.getElementById("editor");
const btnIn = document.getElementById("btnSignIn");
const btnOut = document.getElementById("btnSignOut");

function setStatus(msg) {
  statusEl.textContent = msg ? String(msg) : "";
}

const firebaseConfig = window.FIREBASE_CONFIG;
if (!firebaseConfig?.apiKey || !firebaseConfig?.projectId) {
  setStatus("FIREBASE_CONFIG no configurado. Revisa firebase-config.js");
  btnIn.disabled = true;
} else {
  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  btnIn.addEventListener("click", async () => {
    setStatus("");
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      const code = err?.code ? ` (${err.code})` : "";
      if (err?.code === "auth/unauthorized-domain") {
        setStatus("Dominio no autorizado en Firebase Auth. Agrega leandro-designer.github.io en Authentication -> Settings -> Authorized domains." + code);
      } else {
        setStatus("No se pudo iniciar sesión." + code);
      }
      console.error(err);
    }
  });

  btnOut.addEventListener("click", async () => {
    setStatus("");
    try {
      await signOut(auth);
    } catch (err) {
      console.error(err);
      setStatus("No se pudo cerrar sesión.");
    }
  });

  async function loadSlot(slot) {
    try {
      const snap = await getDoc(doc(db, "videos", String(slot)));
      if (!snap.exists()) return null;
      const data = snap.data() || {};
      return data.videoId ?? null;
    } catch {
      return null;
    }
  }

  async function refreshInputs() {
    const rows = Array.from(document.querySelectorAll(".admin-row[data-slot]"));
    await Promise.all(rows.map(async (row) => {
      const slot = row.dataset.slot;
      const current = await loadSlot(slot);
      const input = row.querySelector(".videoInput");
      // Don't clobber what the admin is typing.
      if (input && !input.value && current) input.value = current;
    }));
  }

  async function saveSlot(slot, raw) {
    const id = normalizeYouTubeId(raw);
    if (!id) {
      setStatus("Pega un link o ID válido de YouTube.");
      return;
    }

    setStatus("Guardando...");
    try {
      await setDoc(
        doc(db, "videos", String(slot)),
        { videoId: id, updatedAt: serverTimestamp() },
        { merge: true }
      );
      setStatus(`Guardado slot ${slot}.`);
    } catch (err) {
      console.error(err);
      if (err?.code === "permission-denied") {
        setStatus("Permiso denegado. Ajusta tus Firestore Rules para permitir write solo a tu usuario (Auth).");
      } else {
        setStatus("Error guardando en Firestore.");
      }
    }
  }

  document.querySelectorAll(".admin-row").forEach((row) => {
    const slot = row.dataset.slot;
    const input = row.querySelector(".videoInput");
    const btn = row.querySelector(".btnSave");
    if (!slot || !input || !btn) return;

    btn.addEventListener("click", async () => {
      await saveSlot(slot, input.value);
      await refreshInputs();
    });
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      userInfoEl.textContent = "";
      editorEl.style.display = "none";
      btnOut.style.display = "none";
      btnIn.style.display = "inline-block";
      setStatus("");
      return;
    }

    const label = user.email ? user.email : user.uid;
    userInfoEl.textContent = `Sesión iniciada: ${label}`;
    editorEl.style.display = "block";
    btnOut.style.display = "inline-block";
    btnIn.style.display = "none";
    await refreshInputs();
  });
}
</script>

</body>
</html>
